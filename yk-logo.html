                          );

  function randomInteger(min, max) {
    let rand = min - 0.5 + Math.random() * (max - min + 1);
    return Math.round(rand);
  }

  let isPlay = true;
  function StartStopFunction(){
    isPlay = !isPlay;
    if (!isPlay){
      clearInterval(st_int);
      document.getElementById('stop_button').innerHTML = "Start Animate";
    }
    else {
      st_int = setInterval(replaceContent, 4000);
      document.getElementById('stop_button').innerHTML = "Stop Animate";
    }
  }

  function replaceContent(){
    var firstRnd = randomInteger(0, 20);
    document.getElementById("img_logo").setAttribute("src", logoArray[firstRnd]);
    document.getElementById('link_first').innerHTML = "Логотип "  + (firstRnd + 1);

    var secondRnd = randomInteger(0, 28);
    document.getElementById("img_text").setAttribute("src", textArray[secondRnd]);
    document.getElementById('link_second').innerHTML = "Текст " + (secondRnd + 1);
  }

   var st_int = setInterval(replaceContent, 4000);

</script>
